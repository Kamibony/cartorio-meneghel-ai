name: Deploy to Firebase

on:
  push:
    branches:
      - main

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          channelId: live
          projectId: ${{ secrets.FIREBASE_PROJECT_ID || 'cartorio-meneghel-ai' }}

  deploy-functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js (for firebase-tools)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Firebase Tools
        run: npm install -g firebase-tools

      - name: Setup Python Virtual Environment and Install Dependencies
        working-directory: ./functions
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Setup GCP Auth, APIs and CORS
        env:
          SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID || 'cartorio-meneghel-ai' }}
        run: |
          echo "$SA_KEY" > /tmp/firebase-key.json
          gcloud auth activate-service-account --key-file=/tmp/firebase-key.json
          gcloud services enable aiplatform.googleapis.com --project "$FIREBASE_PROJECT_ID"
          gsutil cors set cors.json gs://$FIREBASE_PROJECT_ID.firebasestorage.app

      - name: Deploy to Firebase Functions
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-key.json
          SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID || 'cartorio-meneghel-ai' }}
        run: |
          firebase deploy --only functions --force --project "$FIREBASE_PROJECT_ID"
